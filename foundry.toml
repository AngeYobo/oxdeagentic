[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 200
via_ir = true 

# Remappings
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Testing
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 15, fail_on_revert = false }

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 1000 }
